<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>تسجيل الدخول - نظام إدارة عناوين IP والأجهزة</title>
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
    <!-- صفحة تسجيل الدخول -->
    <section class="login-page">
        <div class="login-container">
            <!-- بطاقة تسجيل الدخول -->
            <div class="login-card">
                <!-- الشعار -->
                <div class="login-logo">
                    <span class="logo-icon">🌐</span>
                    <h1 class="logo-title">IP Manager</h1>
                </div>

                <!-- عنوان الصفحة -->
                <h2 class="login-title">نظام إدارة عناوين IP والأجهزة</h2>
                <p class="login-subtitle">IP Device Management System</p>

                <!-- رسالة التنبيه -->
                <div id="loginMessage" class="login-message"></div>

                <!-- نموذج تسجيل الدخول -->
                <form id="loginForm" autocomplete="off">
                    <div class="form-group">
                        <label for="username">👤 اسم المستخدم | Username</label>
                        <input type="text" id="username" placeholder="admin" required />
                    </div>

                    <div class="form-group">
                        <label for="password">🔑 كلمة المرور | Password</label>
                        <input type="password" id="password" placeholder="••••••••" required />
                    </div>

                    <div class="login-buttons">
                        <button type="submit" class="btn btn-login">🚀 تسجيل الدخول | Login</button>
                        <button type="reset" class="btn btn-reset">🔄 إعادة تعيين | Reset</button>
                    </div>
                </form>

                <!-- معلومات المساعدة -->
                <div class="login-help">
                    <p>👨‍💻 بيانات الدخول التجريبية:</p>
                    <p><strong>Username:</strong> admin | <strong>Password:</strong> admin123</p>
                </div>
            </div>

            <!-- حقوق النشر -->
            <div class="login-footer">
                <p>&copy; 2026 نظام إدارة عناوين IP والأجهزة. جميع الحقوق محفوظة.</p>
            </div>
        </div>
    </section>

    <script src="js/script.js"></script>
</body>
</html>
